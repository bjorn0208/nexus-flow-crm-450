<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus CRM - High Performance Sales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .kanban-column { min-width: 320px; max-width: 320px; }
        .custom-shadow { box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05); }
        .sidebar-item-active { background: #1e40af; color: white; box-shadow: 0 4px 12px rgba(30, 64, 175, 0.2); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 antialiased overflow-hidden">
    <div id="root"></div>

        const COLORS = {
            primary: '#1E40AF',
            success: '#10B981',
            warning: '#F59E0B',
            danger: '#EF4444',
            bg: '#F8FAFC'
        };

        const MOCK_PIPELINE = [
            { id: 'p1', title: 'Qualificação', value: 450000, items: [
                { id: 'deal-1', company: 'TechFlow Solutions', value: 125000, priority: 'Alta', days: 2, contact: 'Ana Silva' },
                { id: 'deal-2', company: 'Global Logistics', value: 85000, priority: 'Média', days: 5, contact: 'Roberto Santos' }
            ]},
            { id: 'p2', title: 'Proposta Enviada', value: 280000, items: [
                { id: 'deal-3', company: 'EcoEnergia SA', value: 210000, priority: 'Alta', days: 12, contact: 'Marcia Mendes' },
                { id: 'deal-4', company: 'Innovate Corp', value: 70000, priority: 'Baixa', days: 1, contact: 'Lucas Lima' }
            ]},
            { id: 'p3', title: 'Negociação', value: 1200000, items: [
                { id: 'deal-5', company: 'Bank Alpha', value: 1200000, priority: 'Alta', days: 24, contact: 'Fernanda Rocha' }
            ]},
            { id: 'p4', title: 'Fechamento', value: 0, items: [] }
        ];

        const MOCK_LEADS = [
            { id: 1, name: 'Carlos Andrade', company: 'Andrade Advogados', sector: 'Jurídico', source: 'LinkedIn', score: 85, status: 'Hot' },
            { id: 2, name: 'Beatriz Costa', company: 'SoftDesign', sector: 'Tecnologia', source: 'Indicação', score: 92, status: 'Hot' },
            { id: 3, name: 'Gabriel Pires', company: 'AutoParts BR', sector: 'Indústria', source: 'Google Ads', score: 45, status: 'Warm' },
            { id: 4, name: 'Juliana Faria', company: 'Faria Eventos', sector: 'Serviços', source: 'LinkedIn', score: 20, status: 'Cold' },
            { id: 5, name: 'Ricardo Dias', company: 'Dias & Dias', sector: 'Varejo', source: 'Evento Presencial', score: 78, status: 'Warm' },
        ];

        const Sidebar = ({ activeTab, setActiveTab }) => {
            const menuItems = [
                { id: 'dashboard', icon: 'dashboard', label: 'Dashboard' },
                { id: 'pipeline', icon: 'view_kanban', label: 'Pipeline' },
                { id: 'leads', icon: 'groups', label: 'Leads' },
                { id: 'tasks', icon: 'check_circle', label: 'Tarefas' },
                { id: 'settings', icon: 'settings', label: 'Configurações' }
            ];

            return (
                <aside className="w-64 bg-white border-r border-slate-200 h-screen flex flex-col transition-all duration-300">
                    <div className="p-6 mb-4">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-blue-700 rounded-xl flex items-center justify-center text-white">
                                <span className="material-symbols-outlined">bolt</span>
                            </div>
                            <span className="font-bold text-xl tracking-tight text-slate-800">Nexus CRM</span>
                        </div>
                    </div>
                    <nav className="flex-1 px-4 space-y-1">
                        {menuItems.map(item => (
                            <button
                                key={item.id}
                                onClick={() => setActiveTab(item.id)}
                                className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 group ${
                                    activeTab === item.id ? 'sidebar-item-active' : 'text-slate-500 hover:bg-slate-50 hover:text-slate-900'
                                }`}
                            >
                                <span className={`material-symbols-outlined ${activeTab === item.id ? '' : 'text-slate-400 group-hover:text-blue-600'}`}>
                                    {item.icon}
                                </span>
                                <span className="font-medium">{item.label}</span>
                            </button>
                        ))}
                    </nav>
                    <div className="p-6 border-t border-slate-100">
                        <div className="flex items-center gap-3 p-2 rounded-xl bg-slate-50">
                            <div className="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-bold border-2 border-white">
                                D
                            </div>
                            <div className="flex-1 overflow-hidden">
                                <p className="text-sm font-semibold text-slate-900 truncate">Dominic Engineer</p>
                                <p className="text-xs text-slate-500 truncate">Elite Admin</p>
                            </div>
                        </div>
                    </div>
                </aside>
            );
        };

        const KPICard = ({ label, value, trend, icon, color }) => (
            <div className="bg-white p-6 rounded-2xl border border-slate-100 custom-shadow animate-fade-in">
                <div className="flex justify-between items-start mb-4">
                    <div className={`p-2 rounded-xl bg-opacity-10 ${color.bg} ${color.text}`}>
                        <span className="material-symbols-outlined">{icon}</span>
                    </div>
                    <span className={`text-xs font-bold px-2 py-1 rounded-full ${trend > 0 ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}`}>
                        {trend > 0 ? '+' : ''}{trend}%

                </div>
                <div>
                    <p className="text-slate-500 text-sm font-medium">{label}</p>
                    <h3 className="text-2xl font-bold text-slate-900 mt-1">{value}</h3>

        );

        const DashboardView = () => {
            return (
                <div className="space-y-8 p-8 overflow-y-auto h-full">
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <KPICard label="Vendas Totais" value="R$ 2.480.000" trend={12.5} icon="payments" color={{bg: 'bg-blue-500', text: 'text-blue-600'}} />
                        <KPICard label="Novos Leads" value="142" trend={8.2} icon="person_add" color={{bg: 'bg-emerald-500', text: 'text-emerald-600'}} />

                        <KPICard label="Ciclo Médio" value="18 dias" trend={5.1} icon="schedule" color={{bg: 'bg-indigo-500', text: 'text-indigo-600'}} />
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-2 bg-white p-8 rounded-3xl border border-slate-100 custom-shadow">

                                <div>
                                    <h3 className="text-xl font-bold text-slate-900">Previsão de Receita</h3>
                                    <p className="text-slate-500 text-sm">Projeção estimada para os próximos 6 meses</p>
                                </div>
                                <select className="bg-slate-50 border-none rounded-lg text-sm font-medium px-4 py-2 text-slate-600 outline-none">
                                    <option>2023 - 2024</option>
                                    <option>2022 - 2023</option>
                                </select>
                            </div>
                            <div className="h-64 flex items-end justify-between gap-4">
                                {[45, 62, 58, 75, 90, 82].map((height, i) => (
                                    <div key={i} className="flex-1 flex flex-col items-center gap-4">
                                        <div className="w-full bg-slate-50 rounded-t-xl relative overflow-hidden h-full group">
                                            <div 
                                                className="absolute bottom-0 left-0 w-full bg-blue-600 transition-all duration-700 rounded-t-xl" 
                                                style={{height: `${height}%`}}
                                            >
                                                <div className="absolute top-0 left-0 w-full h-24 bg-gradient-to-b from-white/20 to-transparent"></div>
                                            </div>
                                            <div className="absolute inset-0 opacity-0 group-hover:opacity-100 bg-white/10 transition-opacity pointer-events-none flex items-center justify-center">
                                                <span className="text-white text-xs font-bold">R$ {height * 10}k</span>
                                            </div>
                                        </div>
                                        <span className="text-xs font-semibold text-slate-400">Mes {i+1}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="bg-white p-8 rounded-3xl border border-slate-100 custom-shadow flex flex-col items-center justify-center relative overflow-hidden">
                            <div className="absolute top-6 left-6">
                                <h3 className="text-xl font-bold text-slate-900">Meta Mensal</h3>
                                <p className="text-slate-500 text-sm">R$ 800.000 / R$ 1.0M</p>
                            </div>
                            <div className="relative w-48 h-48 mt-8">
                                <svg className="w-full h-full transform -rotate-90">
                                    <circle cx="96" cy="96" r="88" stroke="currentColor" strokeWidth="12" fill="transparent" className="text-slate-100" />
                                    <circle 
                                        cx="96" cy="96" r="88" stroke="currentColor" strokeWidth="12" fill="transparent" 
                                        strokeDasharray="552.92" strokeDashoffset="110.58"
                                        className="text-emerald-500 transition-all duration-1000"
                                    />
                                </svg>
                                <div className="absolute inset-0 flex flex-col items-center justify-center">
                                    <span className="text-4xl font-black text-slate-900">80%</span>
                                    <span className="text-xs font-bold text-slate-400 tracking-widest uppercase">Completo</span>
                                </div>
                            </div>
                            <button className="mt-8 w-full py-3 bg-slate-900 text-white rounded-xl font-bold hover:bg-slate-800 transition-colors">
                                Ver Detalhes da Meta
                            </button>
                        </div>
                    </div>
                </div>

        const PipelineView = () => {
            return (
                <div className="flex h-full p-8 overflow-x-auto gap-6 bg-slate-50/50">
                    {MOCK_PIPELINE.map(column => (
                        <div key={column.id} className="kanban-column flex flex-col gap-4 animate-fade-in">
                            <div className="flex items-center justify-between px-2">
                                <div className="flex items-center gap-2">
                                    <h4 className="font-bold text-slate-700">{column.title}</h4>
                                    <span className="bg-slate-200 text-slate-600 text-[10px] px-2 py-0.5 rounded-full font-bold">{column.items.length}</span>
                                </div>
                                <button className="p-1 hover:bg-slate-200 rounded-lg text-slate-400">
                                    <span className="material-symbols-outlined text-xl">more_horiz</span>
                                </button>
                            </div>
                            <div className="bg-slate-200/50 h-1 rounded-full overflow-hidden">
                                <div className="bg-blue-600 h-full w-1/3"></div>
                            </div>
                            <div className="mb-2 px-2">
                                <span className="text-xs font-bold text-slate-400 uppercase">Valor Total</span>
                                <p className="text-lg font-bold text-slate-900">R$ {column.value.toLocaleString()}</p>
                            </div>
                            <div className="flex-1 space-y-4">
                                {column.items.map(item => (
                                    <div key={item.id} className="bg-white p-5 rounded-2xl border border-slate-100 custom-shadow hover:ring-2 hover:ring-blue-500/20 transition-all cursor-pointer group">
                                        <div className="flex justify-between items-start mb-3">
                                            <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wider ${
                                                item.priority === 'Alta' ? 'bg-rose-100 text-rose-600' : 
                                                item.priority === 'Média' ? 'bg-amber-100 text-amber-600' : 'bg-slate-100 text-slate-600'
                                            }`}>
                                                {item.priority}
                                            </span>
                                            {item.days > 10 && (
                                                <div className="flex items-center gap-1 text-rose-500" title="Negócio estagnado">
                                                    <span className="material-symbols-outlined text-sm">warning</span>
                                                </div>
                                            )}
                                        </div>
                                        <h5 className="font-bold text-slate-900 mb-1 group-hover:text-blue-600 transition-colors">{item.company}</h5>
                                        <p className="text-slate-500 text-xs mb-4 flex items-center gap-1">
                                            <span className="material-symbols-outlined text-sm">person</span>
                                            {item.contact}
                                        </p>
                                        <div className="flex items-center justify-between pt-4 border-t border-slate-50">
                                            <span className="font-bold text-slate-900">R$ {item.value.toLocaleString()}</span>
                                            <div className="flex items-center gap-1 text-slate-400 text-xs font-medium">
                                                <span className="material-symbols-outlined text-sm">history</span>
                                                {item.days}d
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                <button className="w-full py-4 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 hover:border-blue-400 hover:text-blue-500 transition-all font-medium flex items-center justify-center gap-2">
                                    <span className="material-symbols-outlined text-xl">add</span>
                                    Novo Negócio
                                </button>
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        const LeadsView = ({ setSelectedLead }) => {
            return (
                <div className="p-8 space-y-6 overflow-y-auto h-full animate-fade-in">
                    <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <h2 className="text-2xl font-bold text-slate-900">Gestão de Leads</h2>
                        <div className="flex items-center gap-3">
                            <div className="relative">
                                <span className="material-symbols-outlined absolute left-3 top-2.5 text-slate-400">search</span>

                                    type="text" 
                                    placeholder="Filtrar leads..." 
                                    className="pl-10 pr-4 py-2 bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20 w-64 text-sm"
                                />
                            </div>
                            <button className="flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-xl font-bold text-sm hover:bg-blue-700 transition-colors shadow-lg shadow-blue-600/20">

                                    <th className="px-6 py-4">Origem</th>

                                    <th className="px-6 py-4">Status</th>
                                    <th className="px-6 py-4">Ações</th>
                                </tr>

                                    <tr 
                                        key={lead.id} 
                                        onClick={() => setSelectedLead(lead)}
                                        className="hover:bg-slate-50 transition-colors cursor-pointer group"
                                    >
                                        <td className="px-6 py-4">
                                            <div className="flex items-center gap-3">
                                                <div className="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center font-bold text-xs uppercase">
                                                    {lead.name.split(' ').map(n => n[0]).join('')}
                                                </div>
                                                <div>
                                                    <p className="font-bold text-slate-900 group-hover:text-blue-600 transition-colors">{lead.name}</p>
                                                    <p className="text-xs text-slate-500">{lead.company}</p>
                                                </div>
                                            </div>
                                        </td>
                                        <td className="px-6 py-4 text-sm text-slate-600 font-medium">{lead.sector}</td>
                                        <td className="px-6 py-4 text-sm text-slate-500">{lead.source}</td>
                                        <td className="px-6 py-4">
                                            <div className="flex items-center gap-2">
                                                <div className="flex-1 h-1.5 bg-slate-100 rounded-full overflow-hidden max-w-[100px]">
                                                    <div className={`h-full rounded-full ${lead.score > 80 ? 'bg-emerald-500' : lead.score > 40 ? 'bg-amber-500' : 'bg-slate-400'}`} style={{width: `${lead.score}%`}}></div>
                                                </div>
                                                <span className="text-xs font-bold text-slate-700">{lead.score}</span>
                                            </div>

                                                lead.status === 'Warm' ? 'bg-amber-100 text-amber-600' : 'bg-slate-100 text-slate-600'

                                            </span>
                                        </td>

                                            <span className="material-symbols-outlined hover:text-slate-900">more_vert</span>
                                        </td>
                                    </tr>

        const LeadDetailModal = ({ lead, onClose }) => {
            if (!lead) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-end p-4 sm:p-6 bg-slate-900/40 backdrop-blur-sm animate-fade-in" onClick={onClose}>
                    <div className="w-full max-w-2xl bg-white h-full rounded-3xl shadow-2xl flex flex-col overflow-hidden animate-fade-in" onClick={e => e.stopPropagation()}>
                        <div className="p-8 border-b border-slate-100 flex justify-between items-start">
                            <div className="flex items-center gap-4">
                                <div className="w-16 h-16 rounded-2xl bg-blue-700 text-white flex items-center justify-center text-2xl font-bold">
                                    {lead.name[0]}
                                </div>
                                <div>
                                    <h2 className="text-2xl font-bold text-slate-900">{lead.name}</h2>
                                    <p className="text-slate-500">{lead.company} • {lead.sector}</p>
                                </div>
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-slate-100 rounded-full text-slate-400">
                                <span className="material-symbols-outlined">close</span>
                            </button>
                        </div>

                        <div className="flex-1 overflow-y-auto p-8 flex gap-8">
                            <div className="flex-1 space-y-8">
                                <div>
                                    <h3 className="text-sm font-bold text-slate-900 uppercase tracking-widest mb-6">Timeline de Interação</h3>
                                    <div className="relative border-l-2 border-slate-100 ml-3 space-y-8">
                                        {[
                                            { icon: 'mail', title: 'E-mail enviado', desc: 'Proposta comercial de expansão de licenças.', time: 'Ontem, 14:20' },
                                            { icon: 'phone', title: 'Chamada realizada', desc: 'Discussão técnica sobre integração de API.', time: 'Seg, 10:45' },
                                            { icon: 'note_alt', title: 'Nota de reunião', desc: 'Cliente interessado no módulo de inteligência artificial.', time: '05 Out, 2023' }
                                        ].map((event, idx) => (
                                            <div key={idx} className="relative pl-8">
                                                <div className="absolute -left-[11px] top-0 w-5 h-5 bg-white border-2 border-blue-600 rounded-full flex items-center justify-center">
                                                    <span className="material-symbols-outlined text-[10px] text-blue-600 font-bold">{event.icon}</span>
                                                </div>
                                                <div className="bg-slate-50 p-4 rounded-2xl">
                                                    <div className="flex justify-between items-start mb-1">

                                                        <span className="text-[10px] text-slate-400 font-bold">{event.time}</span>
                                                    </div>
                                                    <p className="text-xs text-slate-600 leading-relaxed">{event.desc}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div className="w-64 space-y-6">
                                <div className="p-4 bg-blue-50 rounded-2xl border border-blue-100">
                                    <h4 className="text-xs font-bold text-blue-800 uppercase tracking-wider mb-3">Ações Rápidas</h4>
                                    <div className="space-y-2">
                                        <button className="w-full flex items-center gap-2 p-2 bg-white rounded-lg text-xs font-bold text-blue-700 hover:shadow-md transition-all">
                                            <span className="material-symbols-outlined text-sm">calendar_today</span>
                                            Agendar Demo
                                        </button>
                                        <button className="w-full flex items-center gap-2 p-2 bg-white rounded-lg text-xs font-bold text-blue-700 hover:shadow-md transition-all">
                                            <span className="material-symbols-outlined text-sm">edit</span>
                                            Nova Nota
                                        </button>
                                    </div>
                                </div>
                                <div>
                                    <h4 className="text-xs font-bold text-slate-900 uppercase tracking-wider mb-4">Próximas Tarefas</h4>

                                        </div>
                                        <div className="flex items-center gap-3 group">
                                            <div className="w-5 h-5 border-2 border-slate-300 rounded group-hover:border-blue-500 cursor-pointer"></div>
                                            <span className="text-xs text-slate-600 font-medium">Ligar para aprovação</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

        const CommandBar = ({ isOpen, setIsOpen }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-start justify-center pt-24 px-4 bg-slate-900/60 backdrop-blur-sm" onClick={() => setIsOpen(false)}>
                    <div className="w-full max-w-2xl bg-white rounded-2xl shadow-2xl overflow-hidden animate-fade-in" onClick={e => e.stopPropagation()}>
                        <div className="p-4 border-b border-slate-100 flex items-center gap-4">
                            <span className="material-symbols-outlined text-slate-400">search</span>
                            <input 
                                autoFocus 
                                placeholder="Pressione para buscar por clientes, negócios ou relatórios..." 
                                className="flex-1 outline-none text-slate-900 text-lg font-medium"
                            />
                            <div className="px-2 py-1 bg-slate-100 rounded text-[10px] font-bold text-slate-500">ESC</div>
                        </div>
                        <div className="p-4 max-h-96 overflow-y-auto">
                            <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4 px-2">Recentes</h4>
                            <div className="space-y-1">
                                {['Ver Pipeline de Vendas', 'Novo Lead: Santander SA', 'Relatório de Forecasting Q4'].map((item, idx) => (
                                    <div key={idx} className="flex items-center gap-3 p-3 hover:bg-slate-50 rounded-xl cursor-pointer group">
                                        <span className="material-symbols-outlined text-slate-400 group-hover:text-blue-600">history</span>
                                        <span className="text-sm font-semibold text-slate-700">{item}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [selectedLead, setSelectedLead] = useState(null);
            const [isCommandOpen, setIsCommandOpen] = useState(false);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                        e.preventDefault();
                        setIsCommandOpen(true);
                    }
                    if (e.key === 'Escape') {
                        setIsCommandOpen(false);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            return (
                <div className="flex h-screen overflow-hidden">
                    <Sidebar activeTab={activeTab} setActiveTab={setActiveTab} />
                    
                    <main className="flex-1 flex flex-col min-w-0">
                        <header className="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-8 z-10">
                            <div className="flex items-center gap-4">
                                <button 
                                    onClick={() => setIsCommandOpen(true)}
                                    className="flex items-center gap-3 px-4 py-2 bg-slate-50 rounded-xl border border-slate-100 hover:border-slate-300 transition-all text-slate-400 group min-w-[300px]"
                                >
                                    <span className="material-symbols-outlined text-xl group-hover:text-blue-600 transition-colors">search</span>
                                    <span className="text-sm font-medium">Buscar...</span>
                                    <span className="ml-auto text-[10px] font-bold bg-slate-200 text-slate-500 px-1.5 py-0.5 rounded">Ctrl+K</span>
                                </button>
                            </div>
                            <div className="flex items-center gap-4">
                                <button className="p-2 hover:bg-slate-50 rounded-xl relative text-slate-500">
                                    <span className="material-symbols-outlined">notifications</span>
                                    <span className="absolute top-2 right-2 w-2 h-2 bg-rose-500 rounded-full border-2 border-white"></span>
                                </button>
                                <div className="h-8 w-px bg-slate-200"></div>
                                <button className="flex items-center gap-2 bg-emerald-500 text-white px-5 py-2.5 rounded-xl font-bold text-sm hover:bg-emerald-600 transition-all shadow-lg shadow-emerald-500/20 active:scale-95">
                                    <span className="material-symbols-outlined text-lg">rocket_launch</span>
                                    Upgrade Pro
                                </button>
                            </div>
                        </header>

                        <div className="flex-1 overflow-hidden relative">
                            {activeTab === 'dashboard' && <DashboardView />}
                            {activeTab === 'pipeline' && <PipelineView />}
                            {activeTab === 'leads' && <LeadsView setSelectedLead={setSelectedLead} />}
                            {activeTab === 'tasks' && <div className="p-20 text-center text-slate-400">Em desenvolvimento...</div>}
                            {activeTab === 'settings' && <div className="p-20 text-center text-slate-400">Configurações do Sistema...</div>}
                        </div>
                    </main>

                    <LeadDetailModal lead={selectedLead} onClose={() => setSelectedLead(null)} />
                    <CommandBar isOpen={isCommandOpen} setIsOpen={setIsCommandOpen} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
